<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebHome Workspace</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</head>
<body>
    <div id="dynamic-bg-layer" class="bg-layer"></div>
    
    <div id="app-container">
        <div id="blur-overlay"></div>
        <div id="grid-scale-wrapper">
            <div id="grid-container">
                <div id="ghost-guide"></div>
            </div>
        </div>
    </div>

    <div id="delete-zone">🗑️</div>
    <button id="done-btn">Done</button>

    <div id="edit-panel">
        <div class="panel-tabs">
            <button class="panel-tab active" data-tab="widgets">Widgets</button>
            <button class="panel-tab" data-tab="appearance">Appearance</button>
        </div>
        <div class="panel-content active" id="tab-widgets"></div>
        <div class="panel-content" id="tab-appearance" style="flex-direction: column; gap: 16px;">
            <div style="display: flex; gap: 16px; align-items: center; width: 100%;">
                <div style="display: flex; gap: 8px;" id="bg-presets-list">
                    <div class="bg-thumb" data-preset="1" style="width: 32px; height: 32px; border-radius: 50%; background: var(--bg-preset-1); border: 2px solid white; cursor: pointer;"></div>
                    <div class="bg-thumb bg-dynamic" data-preset="2" style="width: 32px; height: 32px; border-radius: 50%; background: var(--bg-preset-2); border: 2px solid transparent; cursor: pointer;"></div>
                    <div class="bg-thumb bg-dynamic" data-preset="3" style="width: 32px; height: 32px; border-radius: 50%; background: var(--bg-preset-3); border: 2px solid transparent; cursor: pointer;"></div>
                    
                    <button id="custom-bg-btn" style="width: 32px; height: 32px; border-radius: 50%; background: rgba(128,128,128,0.2); border: 1px dashed var(--text-secondary); cursor: pointer; color: var(--text-primary); font-size: 16px; display: flex; align-items: center; justify-content: center;">+</button>
                    <input type="file" id="custom-bg-input" accept="image/*" style="display: none;">
                </div>
            </div>
            
            <div style="display: flex; gap: 16px; align-items: center; width: 100%; justify-content: space-between;">
                <div style="flex: 1; display: flex; flex-direction: column; gap: 4px;">
                    <label style="font-size: 11px; color: var(--text-secondary);">Blur Overlay</label>
                    <input type="range" id="blur-slider" min="0" max="40" value="16" style="width: 100%;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px; align-items: flex-end;">
                    <label style="font-size: 11px; color: var(--text-secondary);">Light Mode</label>
                    <label class="glass-toggle-switch">
                        <input type="checkbox" id="theme-toggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10000; align-items: center; justify-content: center;">
        <div id="edit-modal" style="background: var(--modal-bg); padding: 24px; border-radius: 16px; width: 340px; border: 1px solid var(--panel-border); display: flex; flex-direction: column; gap: 16px; color: var(--text-primary);">
            <input type="hidden" id="edit-w-id">
            
            <div class="modal-field id-shortcut-only" style="display: flex; flex-direction: column; gap: 6px;">
                <label style="color: var(--text-secondary); font-size: 12px;">Title</label>
                <input type="text" class="modal-input" id="edit-w-title">
            </div>
            
            <div class="modal-field id-shortcut-only" style="display: flex; flex-direction: column; gap: 6px;">
                <label style="color: var(--text-secondary); font-size: 12px;">URL</label>
                <input type="text" class="modal-input" id="edit-w-url">
            </div>
            
            <div class="modal-field id-shortcut-only" style="display: flex; flex-direction: column; gap: 6px;">
                <label style="color: var(--text-secondary); font-size: 12px;">Icon</label>
                <input type="text" class="modal-input" id="edit-w-icon" placeholder="Emoji/Text or empty">
            </div>

            <div class="modal-field id-shortcut-only" style="display: flex; flex-direction: column; gap: 6px;">
                <label style="color: var(--text-secondary); font-size: 12px;">Icon Shape</label>
                <div class="shape-options" style="display: flex; gap: 8px;">
                    <button class="shape-btn" data-shape="4px" style="flex:1; padding:8px 0; background:var(--panel-border); border:2px solid transparent; border-radius:8px; cursor:pointer;"><div style="width:20px;height:20px;border:2px solid var(--text-primary);border-radius:2px;margin:auto;"></div></button>
                    <button class="shape-btn" data-shape="20px" style="flex:1; padding:8px 0; background:var(--panel-border); border:2px solid transparent; border-radius:8px; cursor:pointer;"><div style="width:20px;height:20px;border:2px solid var(--text-primary);border-radius:8px;margin:auto;"></div></button>
                    <button class="shape-btn" data-shape="50%" style="flex:1; padding:8px 0; background:var(--panel-border); border:2px solid transparent; border-radius:8px; cursor:pointer;"><div style="width:20px;height:20px;border:2px solid var(--text-primary);border-radius:50%;margin:auto;"></div></button>
                </div>
            </div>

            <div class="modal-field id-shortcut-only" style="display: flex; flex-direction: column; gap: 6px;">
                <label style="color: var(--text-secondary); font-size: 12px;">Icon Background Color</label>
                <div class="color-swatch-container">
                    <div class="color-swatch-btn" data-target="iconBg" data-color="transparent" style="background:#333; font-size:10px; color:white;" title="Transparent">🚫</div>
                    <div class="color-swatch-btn" data-target="iconBg" data-color="#ffffff" style="background:#ffffff;"></div>
                    <div class="color-swatch-btn" data-target="iconBg" data-color="#1e1e2e" style="background:#1e1e2e;"></div>
                    <div class="color-swatch-btn" data-target="iconBg" data-color="#3b82f6" style="background:#3b82f6;"></div>
                    <div class="color-swatch-btn" data-target="iconBg" data-color="#10b981" style="background:#10b981;"></div>
                    <div class="color-picker-wrapper" data-target="iconBg" title="Custom Color"><input type="color"></div>
                </div>
            </div>

            <div class="modal-field id-folder-only" style="display: flex; flex-direction: column; gap: 6px;">
                <label style="color: var(--text-secondary); font-size: 12px;">Folder Name</label>
                <input type="text" class="modal-input" id="edit-folder-title">
            </div>

            <div class="modal-field id-search-only" style="display: flex; flex-direction: column; gap: 6px;">
                <label style="color: var(--text-secondary); font-size: 12px;">Search Engine</label>
                <select class="modal-input" id="edit-search-engine">
                    <option value="google">Google</option>
                    <option value="bing">Bing</option>
                    <option value="duckduckgo">DuckDuckGo</option>
                </select>
            </div>
            <div class="modal-field id-search-only" style="display: flex; flex-direction: column; gap: 6px;">
                <label style="color: var(--text-secondary); font-size: 12px;">Placeholder</label>
                <input type="text" class="modal-input" id="edit-search-placeholder">
            </div>

            <div style="width: 100%; height: 1px; background: var(--panel-border); margin: 4px 0;"></div>

            <div style="display: flex; flex-direction: column; gap: 6px;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <label style="color: var(--text-secondary); font-size: 12px;">Widget Body Color</label>
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <span style="color: var(--text-secondary); font-size: 11px;">Frosted Glass</span>
                        <label class="glass-toggle-switch">
                            <input type="checkbox" id="edit-w-glass-toggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
                <div class="color-swatch-container">
                    <div class="color-swatch-btn" data-target="widgetBg" data-color="transparent" style="background:#333; font-size:10px; color:white;" title="Transparent">🚫</div>
                    <div class="color-swatch-btn" data-target="widgetBg" data-color="#ffffff" style="background:#ffffff;"></div>
                    <div class="color-swatch-btn" data-target="widgetBg" data-color="#1e1e2e" style="background:#1e1e2e;"></div>
                    <div class="color-swatch-btn" data-target="widgetBg" data-color="#3b82f6" style="background:#3b82f6;"></div>
                    <div class="color-swatch-btn" data-target="widgetBg" data-color="#10b981" style="background:#10b981;"></div>
                    <div class="color-picker-wrapper" data-target="widgetBg" title="Custom Color"><input type="color"></div>
                </div>
            </div>

            <div class="modal-actions" style="display: flex; gap: 8px; margin-top: 8px;">
                <button class="modal-btn" id="modal-save-btn" style="flex:1; padding: 10px; background: #3b82f6; border: none; color: white; border-radius: 8px; cursor: pointer;">Save</button>
                <button class="modal-btn" id="modal-cancel-btn" style="flex:1; padding: 10px; background: var(--panel-border); border: none; color: var(--text-primary); border-radius: 8px; cursor: pointer;">Cancel</button>
                <button class="modal-btn" id="modal-delete-btn" style="padding: 10px; background: #ef4444; border: none; color: white; border-radius: 8px; cursor: pointer;">Delete</button>
            </div>
        </div>
    </div>

    <div id="folder-overlay-view" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 9999; align-items: center; justify-content: center;">
        <div style="background: var(--panel-bg); border: 1px solid var(--panel-border); padding: 30px; border-radius: 24px; width: 440px; max-width: 90%;">
            <h3 id="folder-popup-title" style="color: var(--text-primary); font-size: 20px; font-weight: 600; margin-bottom: 20px; text-align: center;">Folder</h3>
            <div id="folder-popup-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; justify-items: center;"></div>
        </div>
    </div>

    <script type="text/javascript">
        window.WidgetGlobals = {
            _registry: new Map(),
            register(cls) {
                if (!cls || !cls.getMetadata) return;
                const meta = cls.getMetadata();
                this._registry.set(meta.type, { cls, meta });
            },
            get(type) {
                const item = this._registry.get(type);
                return item ? item.cls : null;
            },
            getMetadata(type) {
                const item = this._registry.get(type);
                return item ? item.meta : null;
            },
            getAllMetadata() {
                return Array.from(this._registry.values()).map(x => x.meta);
            }
        };
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
